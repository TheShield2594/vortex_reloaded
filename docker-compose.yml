##############################################################################
#  VortexChat — Self-Hosted Docker Compose
#
#  Usage:
#    1. Run the bootstrap script first:  ./scripts/setup.sh
#    2. Then:  docker compose up -d
#
#  This file starts the full VortexChat stack:
#    - web      — Next.js frontend + API routes
#    - signal   — Socket.IO signaling server (gateway, presence, typing)
#    - redis    — Shared cache, rate limiting, event bus
#    - cron     — Periodic task runner (replaces Vercel Cron)
#    - livekit  — Self-hosted LiveKit SFU (voice/video call media)
#    - coturn   — TURN/STUN server (WebRTC NAT traversal for calls)
#    - ntfy     — Self-hosted push notifications (issue #38 — no Google FCM
#                 / Apple APNs relay involved; users subscribe directly to
#                 their own private topic on this server)
#
#  Database: SQLite. The db file is bind-mounted from ./data on the host
#  into both `web` and `signal` (both need direct read/write access) —
#  see the "Database (SQLite)" section in deploy/SELF-HOSTING.md for why
#  it's a plain file rather than a Docker-managed volume, and how that
#  interacts with backups.
#
#  IMPORTANT: because `web` and `signal` share one SQLite file, this stack
#  must run on a single Docker host — do not split it across a Swarm/K8s
#  cluster without re-architecting the database layer.
##############################################################################

services:
  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vortex

  # ─── Vortex Web (Next.js) ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: file:/data/vortex.db
      LIVEKIT_API_URL: http://livekit:7880
      # Internal address of the `ntfy` service below — always set since ntfy
      # ships in this stack by default (like Redis, it costs little to keep
      # running). Per-user opt-in still happens in Settings → Notifications.
      NTFY_SERVER_URL: http://ntfy:80
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); http.get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - vortex

  # ─── Signal Server (Socket.IO gateway) ─────────────────────────────────────
  signal:
    build:
      context: .
      dockerfile: apps/signal/Dockerfile
    ports:
      - "${SIGNAL_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DATABASE_URL: file:/data/vortex.db
      # Handshake auth verification — see apps/signal/.env.example.
      AUTH_JWKS_URL: http://web:3000/api/auth/jwks
      AUTH_JWT_ISSUER: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AUTH_JWT_AUDIENCE: vortex-signal
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); http.get('http://127.0.0.1:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - vortex

  # ─── Cron Runner ───────────────────────────────────────────────────────────
  # No DB access of its own — it only calls web's /api/cron/* HTTP endpoints,
  # so it doesn't need the SQLite volume.
  cron:
    build:
      context: apps/cron
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WEB_URL: http://web:3000
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vortex

  # ─── LiveKit (self-hosted SFU for voice/video calls) ───────────────────────
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      # Client signaling (WebSocket) + HTTP API (RoomServiceClient/health)
      - "${LIVEKIT_PORT:-7880}:7880"
      # WebRTC over TCP fallback, for clients that can't do UDP at all
      - "${LIVEKIT_TCP_PORT:-7881}:7881"
      # RTC media (UDP). 20 ports is enough for a handful of concurrent
      # small calls — widen the range (and the matching port_range_* in
      # livekit.yaml) if you expect heavier concurrent voice/video usage.
      - "50000-50019:50000-50019/udp"
    networks:
      - vortex

  # ─── coturn (TURN/STUN — WebRTC NAT traversal) ─────────────────────────────
  # Needed for clients behind symmetric NAT/restrictive firewalls that can't
  # reach LiveKit directly. Shares TURN_SECRET with livekit.yaml's
  # turn_servers block, so LiveKit hands clients working TURN credentials
  # for this same server.
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49160
      --max-port=49200
      --realm=${TURN_REALM:-vortexchat.local}
      --external-ip=${TURN_EXTERNAL_IP}
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --no-cli
      --no-multicast-peers
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - vortex

  # ─── ntfy (self-hosted push notifications) ─────────────────────────────────
  # Alternative to Web Push (issue #38): the `web` service publishes here
  # over the internal Docker network, and users subscribe directly to their
  # own private topic (Settings → Notifications) from the ntfy app/web UI
  # pointed at NEXT_PUBLIC_NTFY_URL. No Firebase key is configured, so this
  # container never talks to Google/Apple — delivery relies on the
  # subscribing client holding its own connection to this server.
  ntfy:
    image: binwiederhier/ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${NEXT_PUBLIC_NTFY_URL:-http://localhost:8080}
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_CACHE_DURATION: 12h
      NTFY_BEHIND_PROXY: "true"
      NTFY_ENABLE_LOGIN: "false"
    volumes:
      - ntfy_data:/var/lib/ntfy
    ports:
      - "${NTFY_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "-", "http://127.0.0.1:80/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - vortex

volumes:
  redis_data:
  ntfy_data:

networks:
  vortex:
    name: vortex_network
