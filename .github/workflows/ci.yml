name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical

  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Run ESLint only. The style-guardrails check uses a locally-generated
      # baseline that is sensitive to file-set differences between CI and dev
      # machines, producing false positives that can't be reproduced locally.
      # Style-guardrail regressions are caught in local dev via `npm run lint`.
      - run: npx eslint . --max-warnings 0
        working-directory: apps/web
      - run: npm run type-check --workspace=apps/web
      - run: npm run type-check --workspace=apps/signal
      - run: npm run type-check --workspace=packages/db

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --workspace=packages/shared
      - run: npm test --workspace=packages/db
      - run: npm test --workspace=apps/web
      - run: npm run test:a11y:focus --workspace=apps/web
      - run: npm test --workspace=apps/signal

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Static validation of the live Drizzle migration tree
      # (packages/db/migrations): filename format, no duplicate version
      # prefixes, and journal/snapshot consistency.
      - name: Run migration smoke test
        run: npm run test:migration-smoke

      # Runtime counterpart: apply the generated migrations + FTS5 triggers
      # to a throwaway SQLite file and confirm they apply cleanly end-to-end.
      - name: Apply Drizzle migrations to a fresh database
        run: npm run db:migrate --workspace=packages/db
        env:
          DATABASE_URL: file:${{ runner.temp }}/smoke.db

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    # Note: E2E tests run against a freshly-built web app with a throwaway
    # SQLite database; flows that require seeded data are skipped in-suite.
    env:
      # runner.temp is only available in step-level env, not job-level — use
      # github.workspace so db:migrate, build, and next start share one path.
      DATABASE_URL: file:${{ github.workspace }}/e2e.db
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SENTRY_DSN: ""
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      SKIP_STRICT_ENV_VALIDATION: "true"
      # next build runs with NODE_ENV=production, and Better Auth refuses to
      # start without a real secret in production (see betterAuthSecret() in
      # apps/web/lib/auth/better-auth.ts) — CI-only placeholder, never used
      # to sign anything real.
      BETTER_AUTH_SECRET: ci-placeholder-better-auth-secret-not-for-production-use
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Prepare SQLite database
        run: npm run db:migrate --workspace=packages/db
      - name: Build web app
        run: npm run build
        working-directory: apps/web
      - name: Start server
        run: |
          npx next start > /tmp/next-server.log 2>&1 &
          npx wait-on http://localhost:3000 --timeout 60000
        working-directory: apps/web
      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web
      - name: Print server logs
        if: failure()
        run: cat /tmp/next-server.log || true
      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: apps/web/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [checks, test]
    env:
      # Dummy values so Next.js build doesn't fail on missing env vars
      NEXT_PUBLIC_APP_URL: https://placeholder.example.com
      NEXT_PUBLIC_SENTRY_DSN: ""
      # next build runs with NODE_ENV=production, and Better Auth refuses to
      # start without a real secret in production (see betterAuthSecret() in
      # apps/web/lib/auth/better-auth.ts) — CI-only placeholder, never used
      # to sign anything real.
      BETTER_AUTH_SECRET: ci-placeholder-better-auth-secret-not-for-production-use
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=apps/web
      - run: npm run build --workspace=apps/signal
